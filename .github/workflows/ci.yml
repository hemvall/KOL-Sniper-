name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: python -m pip install --require-hashes -r requirements-dev.lock
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: ruff check .
      - run: mypy .
      - run: pytest
      - run: npm run check:builder
      - name: Reject tracked runtime secrets
        run: test -z "$(git ls-files '*.session' '*.session-journal' '.env')"
